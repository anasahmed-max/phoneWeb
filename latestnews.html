<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="css/bootstrap-all.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
</head>
<body>
    <header class="site-header fixed-top">
        <div class="header-topbar">
            <div class="container">
                <div class="topbar-inner">
                    <span>Follow us on X (Twitter)</span>
                    <a class="topbar-cta" href="#">CLICK HERE!</a>
                </div>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg header-navbar">
            <div class="container header-row">
                <button class="navbar-toggler header-toggle border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#headerNav" aria-controls="headerNav" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="bi bi-list"></i>
                </button>

                <a class="navbar-brand brand-mark" href="#">
                    PhoneWeb
                </a>

                <div class="collapse navbar-collapse" id="headerNav">
                    <div class="header-search-wrap">
                        <form class="header-search" role="search">
                            <i class="bi bi-search"></i>
                            <input class="form-control border-0 shadow-none" type="search" placeholder="Mobile Price in Pakistan" aria-label="Search">
                        </form>
                    </div>

                    <ul class="navbar-nav header-actions ms-lg-auto">
                        <li class="nav-item">
                            <a class="nav-link news-pill active" href="#">News</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link social-link" href="#" aria-label="Facebook">
                                <i class="bi bi-facebook"></i>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link social-link" href="#" aria-label="X">
                                <i class="bi bi-twitter-x"></i>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link social-link" href="#" aria-label="Instagram">
                                <i class="bi bi-instagram"></i>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link social-link" href="#" aria-label="YouTube">
                                <i class="bi bi-youtube"></i>
                            </a>
                        </li>
                        <li class="nav-item account-item">
                            <a class="nav-link account-link" href="#">
                                <i class="bi bi-person-fill"></i>
                                <i class="bi bi-caret-down-fill account-caret"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        const heroSlides = document.querySelectorAll('[data-slide]');
        const heroDots = document.querySelectorAll('.hero-dot');
        const prevButton = document.querySelector('.hero-nav-prev');
        const nextButton = document.querySelector('.hero-nav-next');
        let currentSlide = 0;

        function renderHeroSlide(index) {
            heroSlides.forEach((slide, slideIndex) => {
                slide.classList.toggle('active', slideIndex === index);
            });

            heroDots.forEach((dot, dotIndex) => {
                dot.classList.toggle('active', dotIndex === index);
            });
        }

        function goToHeroSlide(index) {
            currentSlide = (index + heroSlides.length) % heroSlides.length;
            renderHeroSlide(currentSlide);
        }

        prevButton.addEventListener('click', () => goToHeroSlide(currentSlide - 1));
        nextButton.addEventListener('click', () => goToHeroSlide(currentSlide + 1));
        heroDots.forEach((dot, index) => {
            dot.addEventListener('click', () => goToHeroSlide(index));
        });

        setInterval(() => {
            goToHeroSlide(currentSlide + 1);
        }, 4500);

        renderHeroSlide(currentSlide);

        const minRange = document.getElementById('minRange');
        const maxRange = document.getElementById('maxRange');
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const minLabel = document.getElementById('minLabel');
        const maxLabel = document.getElementById('maxLabel');
        const priceProgress = document.getElementById('priceProgress');
        const maxPrice = 650000;
        const minGap = 5000;

        function formatLabel(value) {
            return value >= 100000 ? `${(value / 100000).toFixed(value % 100000 === 0 ? 0 : 1)} Lac` : value.toLocaleString();
        }

        function updateSlider(fromMinInput = false) {
            let minValue = Number(minRange.value);
            let maxValue = Number(maxRange.value);

            if (maxValue - minValue < minGap) {
                if (fromMinInput) {
                    minValue = maxValue - minGap;
                    minRange.value = minValue;
                } else {
                    maxValue = minValue + minGap;
                    maxRange.value = maxValue;
                }
            }

            minInput.value = minValue;
            maxInput.value = maxValue;
            minLabel.textContent = minValue.toLocaleString();
            maxLabel.textContent = formatLabel(maxValue);

            const left = (minValue / maxPrice) * 100;
            const right = (maxValue / maxPrice) * 100;
            priceProgress.style.left = `${left}%`;
            priceProgress.style.width = `${right - left}%`;
        }

        function updateFromBoxes() {
            let minValue = Math.max(0, Math.min(Number(minInput.value) || 0, maxPrice - minGap));
            let maxValue = Math.min(maxPrice, Math.max(Number(maxInput.value) || maxPrice, minGap));

            if (maxValue - minValue < minGap) {
                maxValue = Math.min(maxPrice, minValue + minGap);
            }

            minRange.value = minValue;
            maxRange.value = maxValue;
            updateSlider(true);
        }

        minRange.addEventListener('input', () => updateSlider(true));
        maxRange.addEventListener('input', () => updateSlider(false));
        minInput.addEventListener('input', updateFromBoxes);
        maxInput.addEventListener('input', updateFromBoxes);

        updateSlider(true);
    </script>
</body>
</html>
